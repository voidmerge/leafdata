name: Tag and Npm Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version bump type (patch, minor, major) or an explicit version number (e.g., 1.2.3)'
        required: true
        default: 'patch'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, Tag & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write      # Required to create branches, commits, and tags
      id-token: write      # Required for npm Trusted Publishing OIDC token
      pull-requests: write # Required to open and auto-merge PRs

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Upgrade npm CLI
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      - name: Run CI Checks
        run: npm run test

      - name: Configure Git Bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"

      - name: Create Release Branch & Bump Version
        id: version_bump
        run: |
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          BRANCH_NAME="release/v$NEW_VERSION"
          git checkout -b $BRANCH_NAME

          git add package.json package-lock.json
          git commit -m "chore(release): v$NEW_VERSION"

          git push origin $BRANCH_NAME --force
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create and Enable Auto-Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version_bump.outputs.version }}"
          BRANCH="${{ steps.version_bump.outputs.branch_name }}"

          # Create the PR from the release branch to main
          PR_URL=$(gh pr create \
            --title "chore(release): v$VERSION" \
            --body "Automated version bump and release pipeline for version v$VERSION." \
            --head "$BRANCH" \
            --base "main")

          gh pr merge "$PR_URL" --squash --auto

      - name: Build TypeScript Package
        run: npm run build

      - name: Create and Push Git Tag
        run: |
          VERSION="${{ steps.version_bump.outputs.version }}"
          git tag v$VERSION
          git push origin v$VERSION

      - name: Publish Package to npm
        run: npm publish --access public
