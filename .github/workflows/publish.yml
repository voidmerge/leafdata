name: Manual Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version bump type (patch, minor, major) or an explicit version number (e.g., 1.2.3)'
        required: true
        default: 'patch'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, Tag & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Upgrade npm CLI
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      - name: Run CI Checks
        run: npm run test

      - name: Configure Git Bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Package Version & Tag
        id: version_bump
        run: |
          npm version ${{ github.event.inputs.version }} -m "chore(release): %s [skip ci]"
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build TypeScript Package
        run: npm run build

      - name: Push Git Changes & Tags
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin v${{ steps.version_bump.outputs.version }}

      - name: Publish Package to npm
        run: npm publish --access public
